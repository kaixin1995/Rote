name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - path: server
          - path: web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: bun install

      - name: Run ESLint
        working-directory: ${{ matrix.path }}
        run: bun run lint

      - name: Build
        if: matrix.path == 'web'
        working-directory: ${{ matrix.path }}
        run: bun run build

      - name: Type check
        working-directory: ${{ matrix.path }}
        run: bun run build
